<!DOCTYPE html>
<html lang="zh-TW" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安星租車 | 機場接送｜包車旅遊｜商務用車</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#48344F',   /* 價目表深紫紅色 (取代原本的深藍色) */
                        primaryDark: '#3C2A42', /* 表格標題深紫 */
                        primaryLight: '#5A4B62', /* 表格淺底色 */
                        primaryLighter: '#6B5E72', /* 表格深底色 */
                        secondary: '#D69E2E', /* 金黃色 - 代表尊榮與安"星" */
                        line: '#00B900',      /* LINE 品牌綠 */
                    },
                    fontFamily: {
                        sans: ['"Noto Sans TC"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* 隱藏捲軸但保持可滾動的微調 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        
        .hero-bg {
            /* 橫幅背景疊加顏色也更新為深紫紅色系 */
            background-image: linear-gradient(rgba(72, 52, 79, 0.75), rgba(72, 52, 79, 0.85)), url('https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* 價目表手機版全螢幕自動縮放 (免捲動) */
        @media (max-width: 768px) {
            .responsive-pricing-table {
                min-width: 100% !important;
                font-size: 2.6vw !important; /* 根據螢幕寬度自動縮放整體字體 */
            }
            .responsive-pricing-table th, 
            .responsive-pricing-table td {
                padding: 1vw 0.5vw !important; /* 縮小內距以適應小螢幕 */
                line-height: 1.2 !important;
            }
            .responsive-pricing-table th.whitespace-nowrap,
            .responsive-pricing-table td.whitespace-nowrap {
                white-space: normal !important;
                word-break: keep-all;
            }
            /* 標題與重點文字的比例微調 */
            .responsive-pricing-table .text-xl,
            .responsive-pricing-table .text-2xl,
            .responsive-pricing-table .text-lg {
                font-size: 3vw !important;
            }
